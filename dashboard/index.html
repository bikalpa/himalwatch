<!DOCTYPE html>
<html lang="en" data-theme="dark" data-variant="cartographic">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HimalWatch — Glacial Lake Monitoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root, [data-theme="dark"] {
      --bg:           oklch(0.10 0.015 250);
      --surface:      oklch(0.14 0.012 250);
      --surface2:     oklch(0.18 0.010 250);
      --surface3:     oklch(0.22 0.010 250);
      --border:       oklch(0.24 0.012 250);
      --text:         oklch(0.92 0.008 250);
      --text-muted:   oklch(0.58 0.018 250);
      --text-dim:     oklch(0.38 0.012 250);
      --accent:       oklch(0.65 0.16 200);
      --accent-glow:  oklch(0.65 0.16 200 / 0.12);
      --accent-text:  oklch(0.72 0.14 200);
      --high:         oklch(0.62 0.22 22);
      --high-bg:      oklch(0.15 0.06 22);
      --medium:       oklch(0.70 0.18 55);
      --medium-bg:    oklch(0.15 0.06 55);
      --low:          oklch(0.80 0.14 90);
      --low-bg:       oklch(0.15 0.04 90);
      --success:      oklch(0.65 0.18 155);
      --success-bg:   oklch(0.14 0.06 155);
      --shadow:       0 8px 32px oklch(0 0 0 / 0.5);
    }
    [data-theme="light"] {
      --bg:           oklch(0.96 0.007 80);
      --surface:      oklch(1.00 0.000 0);
      --surface2:     oklch(0.95 0.006 80);
      --surface3:     oklch(0.90 0.008 80);
      --border:       oklch(0.86 0.009 80);
      --text:         oklch(0.18 0.020 250);
      --text-muted:   oklch(0.48 0.018 250);
      --text-dim:     oklch(0.68 0.012 250);
      --accent:       oklch(0.42 0.18 250);
      --accent-glow:  oklch(0.42 0.18 250 / 0.08);
      --accent-text:  oklch(0.40 0.18 250);
      --high:         oklch(0.50 0.22 22);
      --high-bg:      oklch(0.95 0.06 22);
      --medium:       oklch(0.52 0.20 55);
      --medium-bg:    oklch(0.95 0.06 55);
      --low:          oklch(0.50 0.16 90);
      --low-bg:       oklch(0.95 0.05 90);
      --success:      oklch(0.48 0.20 155);
      --success-bg:   oklch(0.94 0.06 155);
      --shadow:       0 8px 32px oklch(0 0 0 / 0.12);
    }

    /* ── Variant: editorial ── */
    [data-variant="editorial"] { --sidebar-w: 220px; }
    [data-variant="editorial"] .hdr-name        { font-size: 20px; letter-spacing: -0.6px; }
    [data-variant="editorial"] .big-stat-val     { font-size: 42px; }
    [data-variant="editorial"] .nav-btn          { padding: 11px 20px; font-size: 14px; }
    [data-variant="editorial"] .detail-name      { font-size: 20px; }
    [data-variant="editorial"] td               { padding: 10px 14px; }

    /* ── Base ── */
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Shell ── */
    .shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .hdr {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px 0 20px;
      gap: 16px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .hdr-brand { display: flex; align-items: baseline; gap: 10px; }
    .hdr-name  { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
    .hdr-name em { color: var(--accent); font-style: normal; }
    .hdr-sub   { font-size: 11px; color: var(--text-muted); letter-spacing: 0.2px; }
    .hdr-gap   { flex: 1; }
    .hdr-stats { display: flex; gap: 20px; align-items: center; }
    .hdr-stat  { font-size: 12px; color: var(--text-muted); }
    .hdr-stat strong { color: var(--text); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .hdr-badge {
      background: var(--high); color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 9px; border-radius: 20px;
      letter-spacing: 0.2px;
    }
    .icon-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); width: 32px; height: 32px;
      border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface3); }

    /* ── Body ── */
    .body { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      padding: 14px 0 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .nav-section { font-size: 10px; font-weight: 600; letter-spacing: 0.9px;
      text-transform: uppercase; color: var(--text-dim);
      padding: 0 16px 8px; }
    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; background: none; border: none;
      color: var(--text-muted); font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; cursor: pointer; width: 100%;
      text-align: left; transition: color 0.12s, background 0.12s;
      border-left: 2px solid transparent; position: relative;
    }
    .nav-btn:hover  { color: var(--text); background: var(--surface2); }
    .nav-btn.active { color: var(--accent); background: var(--accent-glow);
      border-left-color: var(--accent); font-weight: 500; }
    .nav-btn svg    { flex-shrink: 0; }
    .nav-count {
      margin-left: auto;
      background: var(--high); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 1px 5px; border-radius: 8px;
    }
    .sidebar-spacer { flex: 1; }
    .sidebar-foot {
      padding: 12px 16px;
      font-size: 11px; color: var(--text-dim);
      border-top: 1px solid var(--border);
      line-height: 1.7;
    }
    .sidebar-foot a { color: var(--text-muted); }

    /* ── Content ── */
    .content { flex: 1; position: relative; overflow: hidden; }

    /* ── Map ── */
    .map-wrap       { position: absolute; inset: 0; }
    #hw-map         { width: 100%; height: 100%; }
    .map-legend {
      position: absolute; bottom: 28px; left: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 14px; z-index: 10;
      backdrop-filter: blur(8px);
    }
    .legend-title { font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 8px; }
    .legend-row   { display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; font-size: 11px; color: var(--text-muted); }
    .legend-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Detail Panel ── */
    .detail-panel {
      position: fixed; top: 52px; right: 0; bottom: 0;
      width: 360px;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 50; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.3s;
      box-shadow: var(--shadow);
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-head {
      padding: 16px 16px 14px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; position: relative;
    }
    .detail-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 3px; }
    .detail-sub  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .detail-close {
      position: absolute; top: 14px; right: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); width: 28px; height: 28px;
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.12s, background 0.12s;
    }
    .detail-close:hover { color: var(--text); background: var(--surface3); }
    .detail-body  { flex: 1; overflow-y: auto; padding: 16px; }
    .detail-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .d-stat {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 11px 13px;
    }
    .d-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin-bottom: 4px; }
    .d-stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.6px;
      font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .d-stat-unit  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .section-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 10px;
    }
    .chart-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 14px; margin-bottom: 16px;
    }
    .chart-years {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace; margin-top: 6px;
    }
    .detail-note { font-size: 11px; color: var(--text-dim); line-height: 1.65; }

    /* ── Overview ── */
    .overview         { padding: 24px; overflow-y: auto; height: 100%; }
    .overview-header  { margin-bottom: 20px; }
    .overview-title   { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 4px; }
    .overview-sub     { font-size: 12px; color: var(--text-muted); }
    .stat-strip       { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .big-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
      transition: border-color 0.15s, background 0.3s;
    }
    .big-stat:hover    { border-color: var(--accent); }
    .big-stat-val      { font-size: 34px; font-weight: 700; letter-spacing: -1.5px;
      font-family: 'JetBrains Mono', monospace; line-height: 1; margin-bottom: 5px; }
    .big-stat-label    { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .big-stat-delta    { font-size: 12px; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
    .ov-grid           { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .panel-title  { font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; }
    .lake-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.1s;
    }
    .lake-row:last-child { border-bottom: none; padding-bottom: 0; }
    .lake-row:hover      { opacity: 0.75; }
    .lake-row-info  { flex: 1; min-width: 0; }
    .lake-row-name  { font-size: 13px; font-weight: 500; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .lake-row-id    { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
    .lake-row-chg   { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }

    /* ── Lakes table ── */
    .lakes-view  { display: flex; flex-direction: column; height: 100%; }
    .lakes-toolbar {
      padding: 10px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .search-input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 12px;
      font-family: 'Space Grotesk', sans-serif; font-size: 13px;
      color: var(--text); width: 240px; outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus       { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }
    .table-count  { font-size: 12px; color: var(--text-muted); }
    .table-wrap   { overflow: auto; flex: 1; }
    table         { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2); padding: 9px 14px;
      text-align: left; font-size: 10px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; cursor: pointer; user-select: none;
      white-space: nowrap; position: sticky; top: 0; z-index: 1;
      transition: color 0.12s;
    }
    thead th:hover          { color: var(--text); }
    thead th.sort-asc::after  { content: " ↑"; color: var(--accent); }
    thead th.sort-desc::after { content: " ↓"; color: var(--accent); }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    td         { padding: 8px 14px; white-space: nowrap; }
    td.mono    { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
    td.num     { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* ── Alerts ── */
    .alerts-view    { padding: 20px; overflow-y: auto; height: 100%; }
    .alerts-header  { margin-bottom: 16px; }
    .alerts-title   { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 3px; }
    .alerts-sub     { font-size: 12px; color: var(--text-muted); }
    .alerts-grid    {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px; max-width: 1100px;
    }
    .alert-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 10px; padding: 16px;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .alert-card:hover  { transform: translateY(-1px); box-shadow: var(--shadow); }
    .alert-card.HIGH   { border-left-color: var(--high);   }
    .alert-card.MEDIUM { border-left-color: var(--medium); }
    .alert-card.LOW    { border-left-color: var(--low);    }
    .ac-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .ac-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .ac-id   { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
    .ac-body { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .ac-stat .ac-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); }
    .ac-stat .ac-value { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .ac-mini-chart     { margin-top: 12px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .badge-HIGH   { background: var(--high-bg);   color: var(--high);   }
    .badge-MEDIUM { background: var(--medium-bg); color: var(--medium); }
    .badge-LOW    { background: var(--low-bg);    color: var(--low);    }
    .pos { color: var(--high); }
    .neg { color: var(--success); }
    .neu { color: var(--text-muted); }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── MapLibre overrides ── */
    .maplibregl-popup-content {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      padding: 13px 15px !important;
      font-family: 'Space Grotesk', sans-serif !important;
      font-size: 12px !important;
      min-width: 210px !important;
      box-shadow: 0 8px 32px oklch(0 0 0 / 0.4) !important;
    }
    .maplibregl-popup-tip  { display: none !important; }
    .popup-name   { font-weight: 700; font-size: 14px; margin-bottom: 9px; letter-spacing: -0.2px; }
    .popup-row    { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; }
    .popup-lbl    { color: var(--text-muted); }
    .popup-val    { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .popup-action {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--accent); cursor: pointer;
      background: none; border-left: none; border-right: none; border-bottom: none;
      font-family: 'Space Grotesk', sans-serif; width: 100%; text-align: left;
      transition: opacity 0.12s;
    }
    .popup-action:hover         { opacity: 0.75; }
    .maplibregl-ctrl-bottom-right { display: none; }

    /* ── Loading ── */
    .loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 200;
      transition: opacity 0.4s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
