version: 2

sources:
  - name: raw_lakes
    description: >
      Raw glacial lake detections written by the pipeline to Cloudflare R2.
      One Parquet file per tile per year at raw/lakes/{tile}/{year}/lakes.parquet.
    tables:
      - name: lakes
        description: Raw lake polygon detections from Sentinel-2 NDWI pipeline.
        columns:
          - name: lake_id
            description: Stable 8-char UUID assigned by spatial join against lakes_master.
          - name: geometry_wkt
            description: Lake polygon as WKT string (EPSG:4326). Readable by DuckDB ST_GeomFromText.
          - name: area_sqm
            description: Lake surface area in square metres (sum of 10m S2 pixels × 100).
          - name: area_ha
            description: Lake surface area in hectares.
          - name: centroid_lat
            description: Latitude of polygon centroid (EPSG:4326).
          - name: centroid_lon
            description: Longitude of polygon centroid (EPSG:4326).
          - name: mean_elevation
            description: Mean SRTM elevation within the lake polygon, metres.
          - name: mean_ndwi
            description: Mean NDWI value within the lake polygon. Water > 0.3.
          - name: mean_ndsi
            description: Mean NDSI within the polygon. Snow > 0.4; water < 0.1.
          - name: volume_m3
            description: Estimated volume (m³) via Cook & Quincey (2015) area-volume scaling.
          - name: volume_mcm
            description: Volume in million cubic metres (MCM).
          - name: detection_year
            description: Year of the Sentinel-2 composite used for detection.
          - name: season_start
            description: Start date of the compositing season (YYYY-MM-DD).
          - name: season_end
            description: End date of the compositing season (YYYY-MM-DD).
          - name: tile
            description: AOI tile name (e.g. khumbu, langtang).
          - name: detected_at
            description: ISO timestamp when this row was generated by the pipeline.

models:
  - name: stg_lake_detections
    description: >
      Cleaned and typed staging layer over raw lake detections.
      Filters nulls and sub-minimum-area rows. Ready for mart aggregation.
    columns:
      - name: lake_id
        description: Stable lake identifier.
        tests:
          - not_null
      - name: detection_date
        description: First day of the compositing season cast to DATE.
        tests:
          - not_null
